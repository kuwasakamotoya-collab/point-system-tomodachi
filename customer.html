<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員登録 / ポイント確認</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#f5f4f0;--card:#ffffff;--accent:#c8960a;--accent-dark:#8a6500;--text:#1a1814;--text2:#888070;--border:#e4e0d8;--success:#2a9060;--danger:#c04040;--radius:16px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
  header{background:var(--accent);color:#fff;padding:20px 20px 24px;text-align:center;}
  header .store-label{font-size:12px;opacity:.85;letter-spacing:.1em;margin-bottom:2px;}
  header h1{font-size:20px;font-weight:700;}
  .wrap{padding:20px 16px;}
  .section-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .section-card .sec-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
  .form-group .sub{font-size:11px;color:var(--text2);margin-bottom:6px;}
  input[type="text"],input[type="tel"]{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:'Noto Sans JP',sans-serif;background:#fafaf8;outline:none;transition:border-color .2s;color:var(--text);}
  input:focus{border-color:var(--accent);background:#fff;}
  .required{color:var(--danger);margin-left:2px;}
  .btn-submit{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:17px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;transition:background .2s;margin-top:6px;}
  .btn-submit:hover{background:var(--accent-dark);}
  .btn-submit:active{transform:scale(.98);}
  .btn-submit:disabled{background:#ccc;cursor:not-allowed;}
  .code-display{text-align:center;padding:24px 16px;}
  .code-display .cd-icon{font-size:48px;margin-bottom:12px;}
  .code-display .cd-title{font-size:18px;font-weight:700;margin-bottom:6px;}
  .code-display .cd-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7;}
  .code-num{font-family:'DM Mono',monospace;font-size:44px;font-weight:700;letter-spacing:10px;color:var(--accent);background:#fdf3d0;border:2px dashed var(--accent);border-radius:14px;padding:18px 24px;margin:0 auto 20px;display:inline-block;}
  .code-note{font-size:13px;color:var(--text2);line-height:1.8;background:var(--bg);border-radius:10px;padding:14px 16px;text-align:left;}
  .point-card{background:linear-gradient(135deg,#c8960a 0%,#e8b820 50%,#c07010 100%);border-radius:var(--radius);padding:24px 24px 20px;color:#fff;margin-bottom:14px;box-shadow:0 4px 20px rgba(160,120,0,.25);position:relative;overflow:hidden;}
  .point-card::before{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);}
  .point-card .pc-label{font-size:11px;opacity:.8;letter-spacing:.12em;margin-bottom:4px;}
  .point-card .pc-name{font-size:20px;font-weight:700;margin-bottom:2px;}
  .point-card .pc-id{font-size:12px;font-family:'DM Mono',monospace;opacity:.75;margin-bottom:18px;}
  .pt-display{display:flex;align-items:baseline;gap:6px;}
  .pt-num{font-size:52px;font-family:'DM Mono',monospace;font-weight:500;line-height:1;}
  .pt-unit{font-size:18px;opacity:.85;}
  .pt-yen{font-size:13px;opacity:.75;margin-top:4px;}
  .rank-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;background:rgba(255,255,255,.2);color:#fff;}
  .hist-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:12px;}
  .hist-item:last-child{border-bottom:none;}
  .hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .hist-dot.add{background:var(--success);}
  .hist-dot.use{background:var(--danger);}
  .hist-body{flex:1;}
  .hist-body .hist-text{font-size:13px;}
  .hist-body .hist-time{font-size:11px;color:var(--text2);margin-top:2px;}
  .hist-pts{font-family:'DM Mono',monospace;font-size:14px;font-weight:600;}
  .hist-pts.add{color:var(--success);}
  .hist-pts.use{color:var(--danger);}
  .empty-hint{text-align:center;padding:20px;color:var(--text2);font-size:12.5px;}
  #notif-banner{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;padding:16px;}
  #notif-banner.show{display:flex;}
  .notif-popup{background:var(--card);border-radius:var(--radius);width:100%;max-width:448px;padding:24px;animation:slideUp .3s ease;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .notif-popup .notif-icon{font-size:28px;margin-bottom:10px;}
  .notif-popup .notif-from{font-size:11px;color:var(--text2);margin-bottom:4px;}
  .notif-popup .notif-title{font-size:18px;font-weight:700;margin-bottom:10px;}
  .notif-popup .notif-body{font-size:13.5px;line-height:1.7;color:#444;white-space:pre-wrap;margin-bottom:20px;}
  .btn-close{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;font-weight:600;cursor:pointer;}
  .center-msg{text-align:center;padding:60px 20px;}
  .center-msg .cm-icon{font-size:48px;margin-bottom:16px;}
  .center-msg h2{font-size:18px;margin-bottom:8px;}
  .center-msg p{font-size:13px;color:var(--text2);line-height:1.7;}
  footer{text-align:center;padding:24px 16px;font-size:11px;color:var(--text2);}
</style>
</head>
<body>

<header>
  <div class="store-label">🏪 ポイントカード</div>
  <h1 id="header-title">読み込み中...</h1>
</header>

<div class="wrap" id="app-wrap">
  <div class="center-msg">
    <div class="cm-icon">⏳</div>
    <p style="color:var(--text2);">読み込み中...</p>
  </div>
</div>

<div id="notif-banner">
  <div class="notif-popup">
    <div class="notif-icon">📣</div>
    <div class="notif-from">お店からのお知らせ</div>
    <div class="notif-title" id="popup-title"></div>
    <div class="notif-body" id="popup-body"></div>
    <button class="btn-close" onclick="closeNotif()">確認しました</button>
  </div>
</div>

<footer>© ポイント管理システム</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxFeAk5UAZK8xvPwlcBXD4XdQk2guMxkMcHhtJKRBPMniPW65Fclr75rDfe3IaSuWO1Yg/exec';
const KEY_NOTIF_READ = 'pm_notif_read';

function getParam(k) { return new URLSearchParams(location.search).get(k); }

async function apiGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function apiPost(data) {
  // GETパラメータとしてデータを送信（CORS回避）
  const params = new URLSearchParams({ payload: JSON.stringify(data) });
  const res = await fetch(GAS_URL + '?' + params);
  return res.json();
}

function getRank(pts) {
  if (pts >= 700) return { label: '💎 プラチナ', desc: '最上位ランク会員です！' };
  if (pts >= 300) return { label: '🥇 ゴールド',  desc: `あと${700-pts}ptでプラチナです。` };
  if (pts >= 100) return { label: '🥈 シルバー', desc: `あと${300-pts}ptでゴールドです。` };
  return { label: '🥉 ブロンズ', desc: `あと${100-pts}ptでシルバーです。` };
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function getReadIds() { return JSON.parse(localStorage.getItem(KEY_NOTIF_READ) || '[]'); }
function markRead(id) {
  const ids = getReadIds();
  if (!ids.includes(id)) { ids.push(id); localStorage.setItem(KEY_NOTIF_READ, JSON.stringify(ids)); }
}

// ── メイン
window.addEventListener('load', async () => {
  const mode = getParam('mode');
  const id   = getParam('id');
  if (mode === 'register') {
    showRegisterForm();
  } else if (id) {
    await showPointCard(id);
  } else {
    showError();
  }
});

// ── 登録フォーム
function showRegisterForm() {
  document.getElementById('header-title').textContent = '新規会員登録';
  document.getElementById('app-wrap').innerHTML = `
    <div class="section-card">
      <div class="sec-label">会員情報を入力してください</div>
      <div class="form-group">
        <label>氏名<span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="山田 太郎" autocomplete="name">
      </div>
      <div class="form-group">
        <label>氏名（フリガナ）</label>
        <input type="text" id="f-kana" placeholder="ヤマダ タロウ">
      </div>
      <div class="form-group">
        <label>電話番号<span class="required">*</span></label>
        <div class="sub">ハイフンなしでも入力できます</div>
        <input type="tel" id="f-tel" placeholder="09012345678">
      </div>
      <div class="form-group">
        <label>生年月日</label>
        <input type="text" id="f-birth" placeholder="例: 1990/01/01">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <div class="sub">お知らせをメールで受け取れます（任意）</div>
        <input type="text" id="f-email" placeholder="example@gmail.com">
      </div>
      <div class="form-group">
        <label>メモ・備考（任意）</label>
        <input type="text" id="f-note" placeholder="アレルギーなど">
      </div>
      <p style="font-size:11px;color:var(--text2);margin-bottom:14px;line-height:1.7;">
        ＊ 入力いただいた情報は会員管理のみに使用します。
      </p>
      <button class="btn-submit" id="submit-btn" onclick="submitRegister()">登録する</button>
    </div>
  `;
}

// ── 登録送信
async function submitRegister() {
  const name  = document.getElementById('f-name').value.trim();
  const kana  = document.getElementById('f-kana').value.trim();
  const tel   = document.getElementById('f-tel').value.trim();
  const birth = document.getElementById('f-birth').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const note  = document.getElementById('f-note').value.trim();
  if (!name) { alert('氏名を入力してください'); return; }
  if (!tel)  { alert('電話番号を入力してください'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const code = genCode();
  const time = new Date().toLocaleString('ja-JP');

  try {
    await apiPost({ action: 'addPending', code, name, kana, tel, birth, note, email, time });
    // コード表示
    document.getElementById('header-title').textContent = '登録コード';
    document.getElementById('app-wrap').innerHTML = `
      <div class="section-card">
        <div class="code-display">
          <div class="cd-icon">✅</div>
          <div class="cd-title">登録申請が完了しました</div>
          <div class="cd-sub">下の6桁のコードをスタッフにお伝えください。<br>スタッフが承認するとカードが発行されます。</div>
          <div class="code-num">${code}</div>
          <div class="code-note">
            📋 <strong>スタッフへの伝達手順</strong><br>
            ① このコードをスタッフに見せる<br>
            ② スタッフが「コード取込」に入力<br>
            ③ 登録完了！次回からQRでポイント確認できます
          </div>
        </div>
      </div>
      <div class="section-card" style="font-size:13px;color:var(--text2);line-height:1.8;">
        <div style="font-weight:700;color:var(--text);margin-bottom:8px;">📝 入力内容の確認</div>
        <div>氏名：<strong style="color:var(--text);">${name}</strong></div>
        ${kana  ? `<div>フリガナ：${kana}</div>` : ''}
        <div>電話番号：${tel}</div>
        ${birth ? `<div>生年月日：${birth}</div>` : ''}
        ${email ? `<div>メール：${email}</div>` : ''}
        ${note  ? `<div>メモ：${note}</div>` : ''}
      </div>
    `;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '登録する';
    alert('送信に失敗しました。ネット接続を確認してください。');
  }
}

// ── ポイントカード表示
async function showPointCard(memberId) {
  document.getElementById('header-title').textContent = 'マイポイント';
  try {
    const data = await apiGet({ action: 'getAll' });
    const memberRows = (data.members || []).slice(1);
    const row = memberRows.find(r => r[0] === memberId);
    if (!row) { showError(); return; }

    const m = { id: row[0], name: row[1], kana: row[2], tel: row[3], birth: row[4], note: row[5], points: parseInt(row[6])||0, created: row[7] };
    const pts = m.points;
    const rank = getRank(pts);

    // 履歴
    const logRows = (data.logs || []).slice(1).reverse();
    const myLogs = logRows.filter(r => r[1] && r[1].includes(`（${m.id}）`)).slice(0, 10);

    let histHTML = '';
    if (!myLogs.length) {
      histHTML = '<div class="empty-hint">まだ履歴がありません</div>';
    } else {
      histHTML = myLogs.map(r => {
        const type = r[0], text = r[1], time = r[2];
        const isAdd = type === 'add';
        const match = text.match(/[＋\+－\-](\d+)pt/);
        const ptStr = match ? (isAdd ? `＋${parseInt(match[1]).toLocaleString()}pt` : `－${parseInt(match[1]).toLocaleString()}pt`) : '';
        return `<div class="hist-item">
          <div class="hist-dot ${type}"></div>
          <div class="hist-body">
            <div class="hist-text">${isAdd ? 'ポイント付与' : 'ポイント使用'}</div>
            <div class="hist-time">${time}</div>
          </div>
          <div class="hist-pts ${type}">${ptStr}</div>
        </div>`;
      }).join('');
    }

    document.getElementById('app-wrap').innerHTML = `
      <div class="point-card">
        <div class="pc-label">MEMBER</div>
        <div class="pc-name">${m.name}</div>
        <div class="pc-id">${m.id}${m.tel ? '　' + m.tel : ''}</div>
        <div class="pt-display">
          <div class="pt-num">${pts.toLocaleString()}</div>
          <div class="pt-unit">pt</div>
        </div>
        <div class="pt-yen">≈ ${pts.toLocaleString()} 円相当</div>
        <div class="rank-badge">${rank.label}</div>
      </div>
      <div class="section-card">
        <div class="sec-label">🏅 ランク</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:10px;">${rank.desc}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <span style="font-size:11px;padding:3px 8px;background:var(--bg);border-radius:4px;">🥉 0〜99pt</span>
          <span style="font-size:11px;padding:3px 8px;background:var(--bg);border-radius:4px;">🥈 100〜299pt</span>
          <span style="font-size:11px;padding:3px 8px;background:var(--bg);border-radius:4px;">🥇 300〜699pt</span>
          <span style="font-size:11px;padding:3px 8px;background:var(--bg);border-radius:4px;">💎 700pt〜</span>
        </div>
      </div>
      <div class="section-card">
        <div class="sec-label">📋 最近の履歴</div>
        ${histHTML}
      </div>
      <div class="section-card">
        <div class="sec-label">💡 ポイントの使い方</div>
        <div style="font-size:13px;line-height:1.9;color:var(--text2);">
          ・1ポイント＝1円としてお会計時に使えます<br>
          ・スタッフにIDをお伝えください<br>
          ・有効期限はありません
        </div>
      </div>
    `;

    // 通知チェック
    const notifRows = (data.notifs || []).slice(1);
    const readIds = getReadIds();
    notifQueue = notifRows.filter(r => !readIds.includes(r[0])).map(r => ({ id: r[0], title: r[1], body: r[2], sent: r[3] }));
    notifIndex = 0;
    if (notifQueue.length > 0) showNextNotif();

  } catch(e) {
    document.getElementById('app-wrap').innerHTML = `
      <div class="center-msg">
        <div class="cm-icon">⚠️</div>
        <h2>読み込みエラー</h2>
        <p>ネット接続を確認して<br>ページを再読み込みしてください。</p>
      </div>
    `;
  }
}

function showError() {
  document.getElementById('header-title').textContent = 'エラー';
  document.getElementById('app-wrap').innerHTML = `
    <div class="center-msg">
      <div class="cm-icon">❓</div>
      <h2>情報が見つかりません</h2>
      <p>QRコードを正しくスキャンしてください。<br>問題が続く場合はスタッフにお知らせください。</p>
    </div>
  `;
}

// ── 通知
let notifQueue = [], notifIndex = 0;

function showNextNotif() {
  if (notifIndex >= notifQueue.length) return;
  const n = notifQueue[notifIndex];
  document.getElementById('popup-title').textContent = n.title;
  document.getElementById('popup-body').textContent = n.body;
  document.getElementById('notif-banner').classList.add('show');
}

function closeNotif() {
  markRead(notifQueue[notifIndex].id);
  notifIndex++;
  document.getElementById('notif-banner').classList.remove('show');
  setTimeout(() => { if (notifIndex < notifQueue.length) showNextNotif(); }, 300);
}
</script>
</body>
</html>
